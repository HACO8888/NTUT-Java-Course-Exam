<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大老二 Online</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Lobby -->
    <div id="lobby" class="screen active">
        <div class="lobby-container">
            <h1 class="lobby-title">大老二 Online</h1>
            <p class="lobby-subtitle">線上多人大老二</p>
            <div class="glass-panel lobby-form">
                <label class="field-label">玩家名稱</label>
                <input type="text" id="playerName" class="styled-input" placeholder="請輸入你的名稱" maxlength="12">

                <label class="field-label">伺服器位址</label>
                <input type="text" id="serverAddr" class="styled-input" placeholder="api-big2.haco.tw" value="">

                <div class="divider-space"></div>

                <button id="createRoomBtn" class="pill-btn green">建立房間</button>

                <div class="divider-space"></div>
                <label class="field-label">房間代碼</label>
                <input type="text" id="roomCodeInput" class="styled-input" placeholder="輸入房間代碼" maxlength="4" style="text-transform:uppercase">

                <button id="joinRoomBtn" class="pill-btn blue">加入房間</button>
            </div>
        </div>
    </div>

    <!-- Waiting Room -->
    <div id="waitingRoom" class="screen">
        <div class="waiting-container">
            <h2 class="waiting-title">等待室</h2>
            <p class="waiting-subtitle">房間代碼</p>
            <div id="roomCodeDisplay" class="room-code">----</div>

            <div class="glass-panel seats-grid">
                <div class="seat-slot" data-seat="0">
                    <div class="seat-info">
                        <span class="seat-name">空位</span>
                        <span class="seat-status">座位 1</span>
                    </div>
                    <button class="ai-btn pill-btn small blue" style="display:none">+ AI</button>
                </div>
                <div class="seat-slot" data-seat="1">
                    <div class="seat-info">
                        <span class="seat-name">空位</span>
                        <span class="seat-status">座位 2</span>
                    </div>
                    <button class="ai-btn pill-btn small blue" style="display:none">+ AI</button>
                </div>
                <div class="seat-slot" data-seat="2">
                    <div class="seat-info">
                        <span class="seat-name">空位</span>
                        <span class="seat-status">座位 3</span>
                    </div>
                    <button class="ai-btn pill-btn small blue" style="display:none">+ AI</button>
                </div>
                <div class="seat-slot" data-seat="3">
                    <div class="seat-info">
                        <span class="seat-name">空位</span>
                        <span class="seat-status">座位 4</span>
                    </div>
                    <button class="ai-btn pill-btn small blue" style="display:none">+ AI</button>
                </div>
            </div>

            <div id="waitingStatus" class="status-text">等待玩家加入...</div>

            <div class="btn-row">
                <button id="startGameBtn" class="pill-btn green" style="display:none" disabled>開始遊戲</button>
                <button id="leaveRoomBtn" class="pill-btn red">離開房間</button>
            </div>
        </div>
    </div>

    <!-- Game -->
    <div id="gameScreen" class="screen">
        <div class="game-layout">
            <!-- Top: opponents -->
            <div id="opponentRow" class="opponent-row"></div>

            <!-- Center: table -->
            <div class="center-area">
                <div class="glass-panel table-area">
                    <div id="tableCards" class="table-cards">
                        <div class="table-empty">桌面空白 — 等待出牌</div>
                    </div>
                    <div id="tableInfo" class="table-info"></div>
                </div>
                <div class="glass-panel log-panel">
                    <div class="log-title">出牌紀錄</div>
                    <div id="gameLog" class="log-content"></div>
                </div>
            </div>

            <!-- Bottom: my hand -->
            <div class="bottom-area">
                <div class="my-info-row">
                    <div id="myInfoPanel" class="player-badge">
                        <div class="avatar" style="background:#38BD6E">我</div>
                        <div class="badge-text">
                            <span class="badge-name">我</span>
                            <span class="badge-cards">0 張</span>
                        </div>
                    </div>
                    <div id="statusText" class="status-text"></div>
                    <div id="handTypeChip" class="hand-type-chip"></div>
                </div>
                <div class="glass-panel hand-area">
                    <div id="myHand" class="hand-container"></div>
                </div>
                <div class="btn-row">
                    <button id="playBtn" class="pill-btn green" disabled>出 牌</button>
                    <button id="passBtn" class="pill-btn red" disabled>Pass</button>
                    <button id="backBtn" class="pill-btn gray">返回大廳</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="resultModal" class="modal" style="display:none">
        <div class="modal-content glass-panel">
            <div id="resultIcon" class="result-icon"></div>
            <h2 id="resultTitle" class="result-title"></h2>
            <p id="resultSub" class="result-sub"></p>
            <button id="resultOkBtn" class="pill-btn green">確定</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
